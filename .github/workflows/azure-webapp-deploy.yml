# Builds both container images, pushes them to Azure Container Registry,
# and deploys the multi-container app to Azure Web App for Containers.
#
# Required GitHub Secrets:
#   ACR_NAME                   – ACR registry name without the .azurecr.io suffix
#   ACR_USERNAME               – ACR admin username  (Registries → Access keys)
#   ACR_PASSWORD               – ACR admin password  (Registries → Access keys)
#   AZURE_WEBAPP_NAME          – Azure Web App name
#   AZURE_WEBAPP_PUBLISH_PROFILE – Publish profile XML from Azure Portal → Web App → Get publish profile
#
# Runtime env-vars that must be set as App Settings on the Web App
# (not in this workflow) so the containers can read them at startup:
#   AZURE_POSTGRES_URL, AZURE_POSTGRES_USER, AZURE_POSTGRES_PASSWORD, JWT_SECRET

name: Build and Deploy to Azure Web App

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  BACKEND_IMAGE: ${{ secrets.ACR_NAME }}.azurecr.io/project-pulse-backend
  FRONTEND_IMAGE: ${{ secrets.ACR_NAME }}.azurecr.io/project-pulse-frontend

jobs:
  # ── 1. Build images and push to ACR ─────────────────────────────────────────
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Backend: compile the JAR first because the Dockerfile COPYs target/*.jar
      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build backend JAR
        run: mvn -f backend/pom.xml clean package -DskipTests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_NAME }}.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
            ${{ env.BACKEND_IMAGE }}:latest

      # Frontend: npm install + vite build run inside the Dockerfile
      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
            ${{ env.FRONTEND_IMAGE }}:latest

  # ── 2. Deploy to Azure Web App for Containers ────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Substitute ${ACR_NAME} in the compose file image references.
      # Other placeholders (AZURE_MYSQL_URL, JWT_SECRET, etc.) are left as-is;
      # Azure reads them from the Web App's Application Settings at runtime.
      - name: Substitute ACR name in compose file
        run: |
          export ACR_NAME="${{ secrets.ACR_NAME }}"
          envsubst '${ACR_NAME}' < docker-compose.azure.yml > docker-compose.deploy.yml

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE}}
          configuration-file: docker-compose.deploy.yml
