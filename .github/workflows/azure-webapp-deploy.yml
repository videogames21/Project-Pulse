# Builds both container images, pushes to ACR, then deploys each to its own Azure Web App.
#
# Required GitHub Secrets:
#   ACR_NAME                       – ACR registry name (without .azurecr.io)
#   ACR_USERNAME                   – ACR admin username
#   ACR_PASSWORD                   – ACR admin password
#   AZURE_WEBAPP_NAME              – Frontend web app name (tcu-project-pulse)
#   AZURE_WEBAPP_PUBLISH_PROFILE   – Frontend publish profile XML
#   AZURE_WEBAPP_NAME_API          – Backend web app name (tcu-project-pulse-api)
#   AZURE_WEBAPP_PUBLISH_PROFILE_API – Backend publish profile XML

name: Build and Deploy to Azure Web App

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  BACKEND_IMAGE: ${{ secrets.ACR_NAME }}.azurecr.io/project-pulse-backend
  FRONTEND_IMAGE: ${{ secrets.ACR_NAME }}.azurecr.io/project-pulse-frontend

jobs:
  # ── 1. Build images and push to ACR ─────────────────────────────────────────
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build backend JAR
        run: mvn -f backend/pom.xml clean package -DskipTests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_NAME }}.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
            ${{ env.BACKEND_IMAGE }}:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
            ${{ env.FRONTEND_IMAGE }}:latest

  # ── 2. Deploy each container to its own Azure Web App ───────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy backend to Azure
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME_API }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_API }}
          images: '${{ env.BACKEND_IMAGE }}:latest'

      - name: Deploy frontend to Azure
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          images: '${{ env.FRONTEND_IMAGE }}:latest'
