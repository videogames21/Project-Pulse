server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Vue Router history mode — serve index.html for all unknown routes.
    # no-cache forces the browser to revalidate index.html on every load so
    # it picks up new Vite asset hashes after a container rebuild.
    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri $uri/ /index.html;
    }

    # Proxy all /api/* requests to the backend container
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}
