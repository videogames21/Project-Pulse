spring:
  application:
    name: project-pulse

  datasource:
    url: jdbc:h2:mem:projectpulsedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    defer-datasource-initialization: true

  sql:
    init:
      mode: always

app:
  base-url: http://localhost:3000

# PRODUCTION REVIEW: Never commit a real secret here.
# Override with the SECURITY_JWT_SECRET environment variable in CI/prod.
# Generate a new secret with: openssl rand -base64 32
# (Must be Base64-encoded — the code uses Decoders.BASE64.decode() to read it)
security:
  jwt:
    secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
    expiration-ms: 86400000
